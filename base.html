<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Torbjørn Carlsen{% endblock %}</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/styles.css' %}">
  <script defer src="{% static 'js/main.js' %}"></script>
</head>
<body>
  <header class="navbar">
    <div class="container">
      <a href="/" class="brand">Torbjørn Carlsen</a>
      <nav class="nav-links">
        <a href="/" class="active">Home</a>
        <a href="/services/">Services</a>
        <a href="/portfolio/">Projects</a>
        <a href="/learning/">Learning</a>
        <a href="/about/">About</a>
        <a href="/contact/">Contact</a>
      </nav>
    </div>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <div class="container">
      <p>&copy; {% now "Y" %} Torbjørn Carlsen. All rights reserved.</p>
    </div>
  </footer>
</body>
</html>
