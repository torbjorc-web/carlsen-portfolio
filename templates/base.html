<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Torbjørn Carlsen{% endblock %}</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/styles.css' %}">
  <script defer src="{% static 'js/main.js' %}"></script>
</head>
<body>
  <header class="navbar">
    <div class="container">
      <a href="/" class="brand">Torbjørn Carlsen</a>
      <nav class="nav-links">
        <a href="/">Home</a>
        <a href="{% url 'service_list' %}">Services</a>
        <a href="{% url 'project_list' %}">Projects</a>
        <a href="{% url 'learning_list' %}">Learning</a>
        <a href="{% url 'about' %}">About</a>
        <a href="{% url 'contact' %}">Contact</a>
        {% if user.is_authenticated and user.is_staff %}
          <a href="{% url 'dashboard' %}">Dashboard</a>
          <a href="{% url 'password_change' %}">Change password</a>
          <a href="{% url 'logout' %}">Logout</a>
        {% else %}
          <a href="{% url 'login' %}">Admin login</a>
        {% endif %}
      </nav>
    </div>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <div class="container">
      <p>&copy; {% now "Y" %} Torbjørn Carlsen. All rights reserved.</p>
    </div>
  </footer>
</body>
</html>
