{% extends 'base.html' %}
{% block title %}Logged out{% endblock %}
{% block content %}
<section class="container login-page">
  <div class="card reveal login-card">
    <span class="eyebrow">Logged out</span>
    <h1>You have been signed out</h1>
    <p class="soft-note">Thanks for checking the dashboard. You can sign in again anytime.</p>
    <a class="btn" href="{% url 'login' %}">Sign in again</a>
  </div>
</section>
{% endblock %}
