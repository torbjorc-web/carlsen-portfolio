{% extends 'base.html' %}
{% block title %}Password changed{% endblock %}
{% block content %}
<section class="container login-page">
  <div class="card reveal login-card">
    <span class="eyebrow">Password updated</span>
    <h1>Your password has been changed</h1>
    <p class="soft-note">You can now continue to the dashboard with your new credentials.</p>
    <a class="btn" href="{% url 'dashboard' %}">Go to Dashboard</a>
  </div>
</section>
{% endblock %}
