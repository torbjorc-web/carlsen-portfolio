{% extends 'base.html' %}
{% block title %}Change password{% endblock %}
{% block content %}
<section class="container login-page">
  <div class="card reveal login-card">
    <span class="eyebrow">Change password</span>
    <h1>Update your admin password</h1>
    <form method="post" class="login-form">
      {% csrf_token %}
      <div class="form-row">
        <label for="id_old_password">Current password</label>
        <input type="password" name="old_password" id="id_old_password" required>
      </div>
      <div class="form-row">
        <label for="id_new_password1">New password</label>
        <input type="password" name="new_password1" id="id_new_password1" required>
      </div>
      <div class="form-row">
        <label for="id_new_password2">Confirm new password</label>
        <input type="password" name="new_password2" id="id_new_password2" required>
      </div>
      <button class="btn" type="submit">Change password</button>
    </form>
  </div>
</section>
{% endblock %}
